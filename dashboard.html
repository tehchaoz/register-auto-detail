<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>RAD — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0f0f1a;
        --surface: #1a1a2e;
        --card: #16213e;
        --card-hover: #1c2a4a;
        --accent: #e94560;
        --accent-hover: #ff6b7a;
        --accent-dim: rgba(233, 69, 96, 0.15);
        --gold: #d4a853;
        --gold-dim: rgba(212, 168, 83, 0.12);
        --text: #fff;
        --text-muted: #8a8aa0;
        --text-dim: #5a5a72;
        --border: #2a2a4a;
        --success: #2ecc71;
        --warning: #f39c12;
        --danger: #e74c3c;
        --radius: 12px;
        --radius-sm: 8px;
        --radius-lg: 16px;
        --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        --font: "Inter", -apple-system, sans-serif;
      }
      html {
        font-size: 16px;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::selection {
        background: var(--accent);
        color: #fff;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 16px;
      }
      .header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 12px 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header .container {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 1.1rem;
        color: var(--text);
        text-decoration: none;
      }
      .logo-icon {
        width: 32px;
        height: 32px;
        background: var(--accent);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        font-weight: 800;
        color: #fff;
      }
      .logo span {
        color: var(--gold);
      }
      .badge {
        background: var(--accent-dim);
        color: var(--accent);
        font-size: 0.7rem;
        font-weight: 600;
        padding: 2px 10px;
        border-radius: 20px;
        white-space: nowrap;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        margin-bottom: 16px;
      }
      .card-title {
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 16px;
      }
      .btn {
        font-family: var(--font);
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-sm);
        padding: 14px 24px;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 48px;
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #d6304a);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        box-shadow: 0 4px 20px rgba(233, 69, 96, 0.35);
      }
      .btn-gold {
        background: linear-gradient(135deg, var(--gold), #b8943f);
        color: #fff;
      }
      .btn-gold:hover {
        box-shadow: 0 4px 20px rgba(212, 168, 83, 0.35);
      }
      .btn-secondary {
        background: var(--surface);
        color: var(--text);
        border: 1.5px solid var(--border);
      }
      .btn-secondary:hover {
        background: var(--card-hover);
        border-color: var(--text-muted);
      }
      .btn-sm {
        font-size: 0.8rem;
        padding: 8px 14px;
        min-height: 36px;
      }
      .btn-bar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        text-align: center;
      }
      .stat-val {
        font-size: 1.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .stat-lbl {
        font-size: 0.7rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-top: 2px;
      }
      .table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
      }
      th {
        background: var(--surface);
        color: var(--text-muted);
        font-weight: 600;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 10px 12px;
        text-align: left;
        white-space: nowrap;
        border-bottom: 2px solid var(--border);
      }
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
        color: var(--text);
      }
      .price-cell {
        color: var(--gold);
        font-weight: 600;
      }
      tr:hover td {
        background: var(--card-hover);
      }
      .dup-row td {
        background: rgba(212, 168, 83, 0.12) !important;
      }
      .dup-row td:first-child::before {
        content: "⚠️ ";
        font-size: 0.7rem;
      }
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
      }
      .empty-state .empty-icon {
        font-size: 3rem;
        margin-bottom: 8px;
        opacity: 0.5;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        font-weight: 500;
        z-index: 999;
        animation: toastIn 0.25s ease;
        max-width: 90%;
      }
      .toast.success {
        background: var(--success);
        color: #fff;
      }
      .toast.error {
        background: var(--danger);
        color: #fff;
      }
      .toast.info {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0);
        }
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: 500;
        display: none;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(2px);
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        animation: modalIn 0.2s ease;
      }
      @keyframes modalIn {
        from {
          transform: scale(0.95);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .modal-title {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 16px;
      }
      .modal .form-group {
        margin-bottom: 12px;
      }
      .modal .btn-group {
        margin-top: 16px;
        display: flex;
        gap: 10px;
      }
      .filter-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .filter-bar input,
      .filter-bar select {
        font-family: var(--font);
        font-size: 0.85rem;
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        padding: 8px 12px;
        outline: none;
      }
      .filter-bar input:focus,
      .filter-bar select:focus {
        border-color: var(--accent);
      }
      @media print {
        body {
          background: #fff;
          color: #000;
          padding: 0;
        }
        .header,
        .btn-bar,
        .filter-bar {
          display: none !important;
        }
        .card {
          border: 1px solid #ddd;
          background: #fff;
        }
        th {
          background: #f5f5f5;
          color: #333;
        }
        td {
          color: #333;
        }
        .price-cell {
          color: #b8860b;
        }
      }
    </style>
  </head>
  <body>
    <!-- ═══ HEADER ═══ -->
    <header class="header">
      <div class="container">
        <a class="logo" href="/">
          <div class="logo-icon">R</div>
          Register Auto Detail <span>Dashboard</span>
        </a>
        <div style="display: flex; align-items: center; gap: 8px">
          <button
            class="btn btn-sm btn-secondary"
            id="lockBtn"
            onclick="handleLockClick()"
          >
            🔒
          </button>
        </div>
      </div>
    </header>

    <!-- ═══ PIN MODAL ═══ -->
    <div
      class="modal-overlay"
      id="pinModal"
      onclick="if(event.target===this)closePinModal()"
    >
      <div class="modal">
        <div class="modal-title">Owner Access Required</div>
        <div class="form-group">
          <label for="pinInput">Enter Owner PIN</label>
          <input
            type="password"
            id="pinInput"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="15"
            placeholder="PIN"
            autocomplete="off"
          />
        </div>
        <div class="btn-group">
          <button class="btn btn-sm btn-primary" onclick="verifyPin()">
            Unlock
          </button>
          <button class="btn btn-sm btn-secondary" onclick="closePinModal()">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <div
      class="container"
      style="padding-top: 16px"
      id="app"
      style="display: none"
    >
      <!-- ═══ STATS ═══ -->
      <div class="stats" id="statsBar"></div>

      <!-- ═══ ACTION BAR ═══ -->
      <div class="btn-bar">
        <button class="btn btn-gold" onclick="exportToSheets()" id="exportBtn">
          📤 Export to Sheets
        </button>
        <button class="btn btn-secondary" onclick="loadEntries()">
          🔄 Refresh
        </button>
        <button class="btn btn-secondary" onclick="window.print()">
          🖨️ Print
        </button>
      </div>

      <!-- ═══ FILTERS ═══ -->
      <div class="filter-bar">
        <input type="date" id="filterDate" onchange="applyFilters()" />
        <select id="filterDealer" onchange="applyFilters()">
          <option value="">All Dealers</option>
        </select>
        <input
          type="text"
          id="filterVin"
          placeholder="Filter VIN..."
          oninput="applyFilters()"
          style="min-width: 120px"
        />
      </div>

      <!-- ═══ TABLE ═══ -->
      <div class="card">
        <div class="card-title" id="titleCount">All Entries — 0</div>
        <div class="table-wrap">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📊</div>
            <p>No entries loaded.</p>
          </div>
          <table id="entriesTable" style="display: none">
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Dealership</th>
                <th>VIN</th>
                <th>Brand</th>
                <th>Model</th>
                <th>Year</th>
                <th>Stock#</th>
                <th>RO#</th>
                <th>Dept</th>
                <th>Service</th>
                <th>Price</th>
                <th>Invoice</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody id="entriesBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const API = "/.netlify/functions/entries";
      const EXPORT_PIN =
        "144a30d4b2dfbdba0b068dec7ed037872425ef00c59c56082c45c218e9c8f912";
      let entries = [];
      let isOwner = sessionStorage.getItem("rad_owner") === "true";
      let dealers = [];

      async function hashPin(pin) {
        const enc = new TextEncoder().encode(pin);
        const buf = await crypto.subtle.digest("SHA-256", enc);
        return Array.from(new Uint8Array(buf))
          .map((b) => b.toString(16).padStart(2, "0"))
          .join("");
      }

      function handleLockClick() {
        if (isOwner) {
          isOwner = false;
          sessionStorage.removeItem("rad_owner");
          document.getElementById("lockBtn").textContent = "🔒";
          showToast("Locked.", "info");
          return;
        }
        document.getElementById("pinInput").value = "";
        document.getElementById("pinModal").classList.add("open");
        document.getElementById("pinInput").focus();
      }

      function closePinModal() {
        document.getElementById("pinModal").classList.remove("open");
      }

      async function verifyPin() {
        const pin = document.getElementById("pinInput").value;
        if (!pin) return showToast("Enter the owner PIN.", "error");
        const h = await hashPin(pin);
        if (h === EXPORT_PIN) {
          closePinModal();
          isOwner = true;
          sessionStorage.setItem("rad_owner", "true");
          document.getElementById("lockBtn").textContent = "🔓";
          showToast("Unlocked — owner access.", "success");
          document.getElementById("app").style.display = "";
          loadEntries();
        } else {
          showToast("Incorrect PIN.", "error");
          document.getElementById("pinInput").value = "";
          document.getElementById("pinInput").focus();
        }
      }

      async function call(method, params) {
        const url =
          method === "GET"
            ? API + (params ? "?" + new URLSearchParams(params) : "")
            : API;
        const opts = {
          method,
          headers: { "Content-Type": "application/json" },
        };
        if (method !== "GET") opts.body = JSON.stringify(params);
        const res = await fetch(url, opts);
        const d = await res.json();
        if (d.status !== "ok") throw new Error(d.message || "Error");
        return d;
      }

      async function loadEntries() {
        try {
          const d = await call("GET");
          entries = d.entries || [];
        } catch (err) {
          return showToast("Failed to load: " + err.message, "error");
        }
        // Extract unique dealers
        dealers = [
          ...new Set(entries.map((e) => e.dealership).filter(Boolean)),
        ].sort();
        populateFilters();
        applyFilters();
      }

      function populateFilters() {
        const sel = document.getElementById("filterDealer");
        sel.innerHTML =
          "<option value=''>All Dealers</option>" +
          dealers
            .map(
              (d) => "<option value='" + esc(d) + "'>" + esc(d) + "</option>",
            )
            .join("");
        const date = document.getElementById("filterDate");
        if (!date.value) {
          const d = new Date();
          date.value =
            d.getFullYear() +
            "-" +
            String(d.getMonth() + 1).padStart(2, "0") +
            "-" +
            String(d.getDate()).padStart(2, "0");
        }
      }

      function applyFilters() {
        const dateFilter = document.getElementById("filterDate").value;
        const dealerFilter = document.getElementById("filterDealer").value;
        const vinFilter = document
          .getElementById("filterVin")
          .value.trim()
          .toUpperCase();

        let filtered = entries;
        if (dateFilter)
          filtered = filtered.filter((e) => e.date === dateFilter);
        if (dealerFilter)
          filtered = filtered.filter((e) => e.dealership === dealerFilter);
        if (vinFilter)
          filtered = filtered.filter((e) =>
            (e.vin || "").toUpperCase().includes(vinFilter),
          );

        // Find duplicates (same VIN+Date)
        const dupMap = {};
        for (const e of filtered) {
          const k = (e.vin || "") + "|" + (e.date || "");
          dupMap[k] = (dupMap[k] || 0) + 1;
        }

        renderTable(filtered, dupMap);
      }

      function renderTable(filtered, dupMap) {
        const tbody = document.getElementById("entriesBody");
        const table = document.getElementById("entriesTable");
        const empty = document.getElementById("emptyState");
        document.getElementById("titleCount").textContent =
          "All Entries — " + filtered.length;

        if (!filtered.length) {
          table.style.display = "none";
          empty.style.display = "";
          renderStats(filtered);
          return;
        }

        table.style.display = "";
        empty.style.display = "none";

        tbody.innerHTML = filtered
          .sort((a, b) => (b.syncedAt || "").localeCompare(a.syncedAt || ""))
          .map((e) => {
            const k = (e.vin || "") + "|" + (e.date || "");
            const isDup = (dupMap[k] || 0) > 1;
            return (
              "<tr class='" +
              (isDup ? "dup-row" : "") +
              "'>" +
              "<td>" +
              esc(e.date) +
              "</td>" +
              "<td>" +
              (e.syncedAt || "").slice(11, 16) +
              "</td>" +
              "<td>" +
              esc(e.dealership) +
              "</td>" +
              "<td>" +
              esc(e.vin) +
              "</td>" +
              "<td>" +
              esc(e.brand) +
              "</td>" +
              "<td>" +
              esc(e.model) +
              "</td>" +
              "<td>" +
              esc(e.year) +
              "</td>" +
              "<td>" +
              esc(e.stock) +
              "</td>" +
              "<td>" +
              esc(e.ro) +
              "</td>" +
              "<td>" +
              esc(e.department) +
              "</td>" +
              "<td>" +
              esc(e.service) +
              "</td>" +
              "<td class='price-cell'>$" +
              (e.price || 0).toFixed(2) +
              "</td>" +
              "<td>" +
              esc(e.invoice) +
              "</td>" +
              "<td>" +
              esc(e.notes) +
              "</td>" +
              "</tr>"
            );
          })
          .join("");

        // Stats
        renderStats(filtered);
      }

      function renderStats(filtered) {
        const bar = document.getElementById("statsBar");
        const total = filtered.length;
        const byDealer = {};
        let totalRev = 0;
        for (const e of filtered) {
          byDealer[e.dealership] = (byDealer[e.dealership] || 0) + 1;
          totalRev += e.price || 0;
        }
        const byDealerHtml = Object.entries(byDealer)
          .sort((a, b) => b[1] - a[1])
          .map(
            ([k, v]) =>
              "<span style='font-size:0.7rem;color:var(--text-muted)'>" +
              esc(k) +
              ": " +
              v +
              "</span>",
          )
          .join(" &middot; ");
        bar.innerHTML =
          "<div class='stat'><div class='stat-val'>" +
          total +
          "</div><div class='stat-lbl'>Entries</div></div>" +
          "<div class='stat'><div class='stat-val'>$" +
          totalRev.toFixed(0) +
          "</div><div class='stat-lbl'>Revenue</div></div>" +
          "<div class='stat'><div class='stat-val' style='font-size:1rem'>" +
          Object.keys(byDealer).length +
          "</div><div class='stat-lbl'>Dealers</div></div>";
      }

      async function exportToSheets() {
        if (!isOwner) {
          document.getElementById("pinModal").classList.add("open");
          return;
        }
        const btn = document.getElementById("exportBtn");
        btn.disabled = true;
        btn.textContent = "⏳ Exporting...";
        try {
          const res = await fetch("/.netlify/functions/export", {
            method: "POST",
          });
          const d = await res.json();
          if (d.status === "ok") {
            showToast(
              "Exported " +
                d.entries +
                " entries across " +
                d.groups +
                " sheets!",
              "success",
            );
          } else {
            showToast("Export failed: " + (d.message || "Error"), "error");
          }
        } catch (err) {
          showToast("Export error: " + err.message, "error");
        }
        btn.disabled = false;
        btn.textContent = "📤 Export to Sheets";
      }

      function esc(s) {
        return (s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function showToast(msg, type) {
        const old = document.querySelector(".toast");
        if (old) old.remove();
        const t = document.createElement("div");
        t.className = "toast " + type;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
      }

      // -- Init --
      if (isOwner) {
        document.getElementById("lockBtn").textContent = "🔓";
        document.getElementById("app").style.display = "";
        loadEntries();
      } else {
        document.getElementById("app").style.display = "none";
        document.getElementById("pinModal").classList.add("open");
        document.getElementById("pinInput").focus();
      }

      document.getElementById("pinInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") verifyPin();
      });
    </script>
  </body>
</html>
